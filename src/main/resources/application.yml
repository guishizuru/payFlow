spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow
    username: postgres
    password: root

  rabbitmq:
      host: localhost
      port: 5672
      username: guest
      password: guest
      listener:
        simple:
          retry:
            enabled: true
            max-attempts: 3
            initial-interval: 1000
            multiplier: 2
            max-interval: 5000

  resilience4j:
    circuitbreaker:
      instances:
        paymentGateway:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
          permittedNumberOfCallsInHalfOpenState: 3

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
